services:
  vault:
    image: hashicorp/vault
    container_name: verkko-vault-dev
    ports:
      - "8201:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - verkko-infra-dev
      - verkko-app-dev

  db:
    image: postgres:17-alpine
    container_name: verkko-db-dev
    ports:
      - "5433:5432"
    env_file:
      - ./envs/.env.db.dev
    command: >
      postgres
        -c ssl=on
        -c ssl_cert_file=/var/lib/postgresql/server.crt
        -c ssl_key_file=/var/lib/postgresql/server.key
    volumes:
      - db-data-dev:/var/lib/postgresql/data
      - ./certs/server.crt:/var/lib/postgresql/server.crt:ro
      - ./certs/server.key:/var/lib/postgresql/server.key:ro
    networks:
      - verkko-infra-dev
      - verkko-app-dev

  vault-init:
    image: hashicorp/vault
    container_name: verkko-vault-init-dev
    volumes:
      - ./vault/vault-init.sh:/vault-init.sh
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: verkko_db
      DB_ADMIN_USER: verkko
      DB_ADMIN_PASS: verkko_dev_pass
      DB_SSLMODE: require
    entrypoint: sh /vault-init.sh
    depends_on:
      - vault
      - db
    restart: "no"
    networks:
      - verkko-infra-dev

networks:
  verkko-infra-dev:
    name: verkko-infra-dev
  verkko-app-dev:
    name: verkko-app-dev

volumes:
  db-data-dev:
