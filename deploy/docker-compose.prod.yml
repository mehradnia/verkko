services:
  app:
    build:
      context: ..
      target: production
    container_name: verkko-service
    ports:
      - "8000:80"
    env_file:
      - ./envs/.env.prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
